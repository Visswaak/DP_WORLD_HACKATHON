# ── Rate limiting ─────────────────────────────────────────────────────────────
# 5 upload requests per minute per IP. Protects OCR + LLM pipeline from abuse.
# burst=5 allows a short spike before requests are dropped.
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream api {
    server backend:8000;
    keepalive 32;   # persistent connections — avoids TCP handshake overhead per request
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

# ── Gzip ──────────────────────────────────────────────────────────────────────
gzip on;
gzip_types application/json application/javascript text/css text/plain;
gzip_min_length 1024;

# ── Main server ───────────────────────────────────────────────────────────────
server {
    listen 80;

    # Enforce upload limit at the gateway before bytes reach Python memory.
    # 8 files × 10 MB + headroom = 85 MB.
    client_max_body_size 85M;

    # ── API routes → FastAPI backend ─────────────────────────────────────────
    location /api/ {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # required for upstream keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Must cover the full pipeline: OCR (up to 30s) + LLM (up to 20s) + headroom.
        proxy_read_timeout    120s;
        proxy_send_timeout     30s;
        proxy_connect_timeout   5s;
    }

    # ── Health check — no rate limit ─────────────────────────────────────────
    location /health {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_read_timeout 10s;
    }

    # ── Frontend — all other routes → React SPA ──────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection  "";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_read_timeout 30s;
    }
}
