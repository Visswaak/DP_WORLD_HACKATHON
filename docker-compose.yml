services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env       # DATABASE_URL in .env points to Supabase — no local DB needed
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
